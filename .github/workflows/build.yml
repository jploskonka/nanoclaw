name: Build and Push Container Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  NANOCLAW_IMAGE: ghcr.io/${{ github.repository }}
  AGENT_IMAGE: ghcr.io/${{ github.repository }}-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (NanoClaw app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NANOCLAW_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Extract metadata (NanoClaw agent)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push NanoClaw app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push NanoClaw agent
        uses: docker/build-push-action@v6
        with:
          context: ./container
          file: ./container/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
