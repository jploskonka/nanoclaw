services:
  nanoclaw:
    image: ghcr.io/jploskonka/nanoclaw:latest
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - ASSISTANT_NAME=Vi
      - MAX_CONCURRENT_CONTAINERS=2
      - ONECLI_URL=http://onecli:10254
      - CONTAINER_IMAGE=nanoclaw-agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nanoclaw-data:/app/data
      - nanoclaw-groups:/app/groups
      - nanoclaw-store:/app/store
    depends_on:
      onecli:
        condition: service_healthy
    networks:
      - nanoclaw-net

  onecli:
    image: ghcr.io/onecli/onecli:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://onecli:${POSTGRES_PASSWORD}@postgres:5432/onecli
      - AUTH_MODE=local
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
    volumes:
      - onecli-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:10254/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nanoclaw-net

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=onecli
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=onecli
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecli"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nanoclaw-net

volumes:
  nanoclaw-data:
  nanoclaw-groups:
  nanoclaw-store:
  onecli-data:
  pgdata:

networks:
  nanoclaw-net:
    driver: bridge
